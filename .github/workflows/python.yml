name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
EOF




name: Variables Practice

on:
  workflow_dispatch:

env:
  COURSE_NAME: "GitHub Actions Practice"

jobs:
  demonstrate-variables:
    runs-on: ubuntu-latest

    env:
      JOB_MESSAGE: "This variable belongs to the entire job"

    steps:
      - name: Display workflow and job variables
        run: |
          echo "Course: $COURSE_NAME"
          echo "Job message: $JOB_MESSAGE"

      - name: Display a step variable
        env:
          STUDENT_NAME: "GitHub Learner"
        run: echo "Student: $STUDENT_NAME"
EOF